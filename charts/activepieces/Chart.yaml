apiVersion: v2
appVersion: 0.28.0
kubeVersion: ">=1.26.0-0"
name: activepieces
version: 0.2.3
dependencies:
  - name: postgresql
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
    version: ~15.5
  - name: redis
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
    version: ~19.5
description: Activepieces is an open source all-in-one automation tool with 100+ integrations
home: https://www.activepieces.com/
icon: https://github.com/adnoctem/artwork/blob/425046029eaed451f5ced22ddc650059dff11878/projects/activepieces/icon/color/activepieces-icon-color.png
keywords:
  - automation
  - workflow
  - activepieces
  - zapier
  - n8n
sources:
  - "https://github.com/adnoctem/helm"
maintainers:
  - name: adnoctem
    email: info@adnoctem.co
  - name: MVProwess
    email: info@mvprowess.com
annotations:
  artifacthub.io/category: integration-delivery
  artifacthub.io/license: MIT
  artifacthub.io/signKey: |
    fingerprint: 97DB36A8BD5E342076ED46D63E317D513290CC4B
    url: https://keys.openpgp.org/vks/v1/by-fingerprint/97DB36A8BD5E342076ED46D63E317D513290CC4B
  artifacthub.io/prerelease: "false"
  artifacthub.io/images: |
    - name: activepieces
      image: docker.io/activepieces/activepieces:0.28.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/adnoctem/helm
    - name: Support
      url: https://github.com/adnoctem/helm/issues
    - name: Activepieces Homepage
      url: https://www.activepieces.com/
    - name: Activepieces Documentation
      url: https://www.activepieces.com/docs/getting-started/introduction
  org.opencontainers.image.vendor: "Ad Noctem Collective"
  org.opencontainers.image.licenses: "MIT"
  # ref: https://artifacthub.io/docs/topics/annotations/helm/
  artifacthub.io/changes: |
    - kind: fixed
      description: "Fix (possibly) crashing deployment due to Bitnami's migration to BSI"
      links:
        - name: Bitnami Migration Issue
          url: https://github.com/bitnami/charts/issues/35164
