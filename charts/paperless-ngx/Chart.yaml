apiVersion: v2
appVersion: 2.10.1
kubeVersion: ">=1.26.0-0"
name: paperless-ngx
version: 0.2.8
dependencies:
  - name: postgresql
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
    version: ~15.5
  - name: redis
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
    version: ~19.5
  - name: tika
    repository: https://apache.jfrog.io/artifactory/tika
    condition: tika.enabled
    version: ~2.9
  - name: gotenberg
    repository: oci://ghcr.io/adnoctem/helm
    condition: gotenberg.enabled
    version: ~0.0.1
description: Paperless-NGX is a community-supported supercharged version of paperless - scan, index and archive all your physical documents
home: https://github.com/paperless-ngx/paperless-ngx
icon: https://github.com/adnoctem/artwork/blob/425046029eaed451f5ced22ddc650059dff11878/projects/paperless-ngx/icon/color/paperless-ngx-icon-color.png
keywords:
  - documents
  - archival
  - ocr
  - conversion
  - paper
  - paperless
sources:
  - "https://github.com/adnoctem/helm"
maintainers:
  - name: adnoctem
    email: info@adnoctem.co
  - name: MVProwess
    email: info@mvprowess.com
annotations:
  artifacthub.io/category: storage
  artifacthub.io/license: MIT
  artifacthub.io/signKey: |
    fingerprint: 97DB36A8BD5E342076ED46D63E317D513290CC4B
    url: https://keys.openpgp.org/vks/v1/by-fingerprint/97DB36A8BD5E342076ED46D63E317D513290CC4B
  artifacthub.io/prerelease: "false"
  artifacthub.io/images: |
    - name: paperless-ngx
      image: ghcr.io/paperless-ngx/paperless-ngx:2.4.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/adnoctem/helm
    - name: Support
      url: https://github.com/adnoctem/helm/issues
    - name: Paperless-NGX GitHub Repository
      url: https://github.com/paperless-ngx/paperless-ngx
    - name: Paperless-NGX Documentation
      url: https://docs.paperless-ngx.com/
  org.opencontainers.image.vendor: "Ad Noctem Collective"
  org.opencontainers.image.licenses: "MIT"
  # ref: https://artifacthub.io/docs/topics/annotations/helm/
  artifacthub.io/changes: |
    - kind: fixed
      description: "Fix crashing deployment due to Bitnami's migration to BSI"
      links:
        - name: Bitnami Migration Issue
          url: https://github.com/bitnami/charts/issues/35164
