name: 'Run Super-Linter'

on: ['push', 'pull_request']

jobs:
  lint:
    name: Super-Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0

      - name: Superlinter
        uses: super-linter/super-linter@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASH_EXEC_IGNORE_LIBRARIES: true
          # mostly false positives
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_JSCPD: false
          VALIDATE_KUBERNETES_KUBECONFORM: false
          # cannot handle Helm templates
          VALIDATE_YAML: false
          # random issues
          VALIDATE_CHECKOV: false
          # prettier cannot handle Helm templates
          # schema.json files do not need to conform to Prettier's standards
          VALIDATE_YAML_PRETTIER: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          # TODO(MVProwess): re-enable these once we're up to date
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
